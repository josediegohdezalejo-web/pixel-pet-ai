name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK with Groq Key
        # Inyectamos tu Secret GROQ_API_KEY
        run: flutter build apk --debug --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # ¡ESTA ES LA CORRECCIÓN CRÍTICA!
        with:
          name: PixelPet-Installer
          path: build/app/outputs/flutter-apk/app-debug.apk
          
